<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="690" viewBox="0 0 1180 690" role="img" aria-labelledby="title desc">
  <title id="title">Vertex-IntervAI AWS Serverless architecture</title>
  <desc id="desc">Architecture diagram showing React frontend, Cognito, API Gateway, Lambda, S3, DynamoDB, Bedrock, Polly, Transcribe, CloudWatch, and Amplify Hosting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 32px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .group-title { font: 700 15px Arial, sans-serif; fill: #334155; text-transform: uppercase; letter-spacing: .5px; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .box-text { font: 400 13px Arial, sans-serif; fill: #475569; }
      .pill { font: 700 12px Arial, sans-serif; fill: #0369a1; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .muted-arrow { stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1180" height="690" rx="24" fill="url(#bg)"/>
  <text class="title" x="50" y="62">Vertex-IntervAI / Talent Graph AI</text>
  <text class="subtitle" x="50" y="91">AWS Serverless AI interview training platform based on user CVs</text>

  <g filter="url(#shadow)">
    <rect x="50" y="130" width="210" height="150" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text class="group-title" x="76" y="163">Frontend</text>
    <text class="box-title" x="76" y="195">React + Vite</text>
    <text class="box-text" x="76" y="222">Dashboard</text>
    <text class="box-text" x="76" y="244">CV upload</text>
    <text class="box-text" x="76" y="266">Interview and result pages</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="50" y="365" width="210" height="115" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text class="group-title" x="76" y="398">Hosting</text>
    <text class="box-title" x="76" y="430">AWS Amplify</text>
    <text class="box-text" x="76" y="457">Build and deploy frontend</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="105" width="210" height="120" rx="16" fill="#ffffff" stroke="#bae6fd"/>
    <text class="group-title" x="366" y="138">Auth</text>
    <text class="box-title" x="366" y="170">Amazon Cognito</text>
    <text class="box-text" x="366" y="197">Hosted UI and JWT</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="290" width="210" height="125" rx="16" fill="#ffffff" stroke="#bae6fd"/>
    <text class="group-title" x="366" y="323">API Layer</text>
    <text class="box-title" x="366" y="355">API Gateway</text>
    <text class="box-text" x="366" y="382">REST routes, CORS</text>
    <text class="box-text" x="366" y="404">JWT authorizer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="630" y="245" width="250" height="210" rx="16" fill="#ffffff" stroke="#fed7aa"/>
    <text class="group-title" x="656" y="278">Backend</text>
    <text class="box-title" x="656" y="310">AWS Lambda</text>
    <text class="box-text" x="656" y="338">upload_cv, analyze_cv</text>
    <text class="box-text" x="656" y="360">create_interview</text>
    <text class="box-text" x="656" y="382">submit_answer</text>
    <text class="box-text" x="656" y="404">history, profile, admin</text>
    <text class="box-text" x="656" y="426">polly_speech, transcribe_audio</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="90" width="180" height="120" rx="16" fill="#ffffff" stroke="#bbf7d0"/>
    <text class="group-title" x="976" y="123">Storage</text>
    <text class="box-title" x="976" y="155">Amazon S3</text>
    <text class="box-text" x="976" y="182">CV and audio files</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="245" width="180" height="120" rx="16" fill="#ffffff" stroke="#bbf7d0"/>
    <text class="group-title" x="976" y="278">Database</text>
    <text class="box-title" x="976" y="310">DynamoDB</text>
    <text class="box-text" x="976" y="337">Users, CVs, interviews</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="400" width="180" height="150" rx="16" fill="#ffffff" stroke="#ddd6fe"/>
    <text class="group-title" x="976" y="433">AI and Voice</text>
    <text class="box-title" x="976" y="465">Bedrock</text>
    <text class="box-text" x="976" y="492">Polly</text>
    <text class="box-text" x="976" y="514">Transcribe</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="630" y="525" width="250" height="95" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text class="group-title" x="656" y="558">Monitoring</text>
    <text class="box-title" x="656" y="590">CloudWatch Logs</text>
  </g>

  <path class="arrow" d="M 260 185 C 292 185, 304 165, 338 165"/>
  <path class="arrow" d="M 260 223 C 300 260, 302 340, 338 352"/>
  <path class="arrow" d="M 550 352 C 585 352, 595 352, 628 352"/>
  <path class="arrow" d="M 880 310 C 915 280, 918 180, 948 155"/>
  <path class="arrow" d="M 880 352 C 912 352, 918 318, 948 305"/>
  <path class="arrow" d="M 880 405 C 913 430, 918 456, 948 475"/>
  <path class="muted-arrow" d="M 755 455 C 755 486, 755 500, 755 523"/>
  <path class="muted-arrow" d="M 155 365 C 155 330, 155 315, 155 282"/>
  <path class="arrow" d="M 155 365 C 155 335, 155 315, 155 282"/>

  <rect x="52" y="605" width="455" height="38" rx="19" fill="#e0f2fe" stroke="#bae6fd"/>
  <text class="pill" x="76" y="629">User flow: sign in - upload CV - analyze - practice interview - review result</text>
</svg>
